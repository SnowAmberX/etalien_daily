syntax = "proto3";

package account;

// 获取登录验证码请求
// POST /account/v1/get_login_verification_code
message GetLoginVerificationCodeRequest {
    string phone_number = 1;
}

message GetLoginVerificationCodeResponse {
    // 服务端返回，通常为空或包含发送状态
}

// 验证码登录请求
// POST /account/v1/login
message LoginRequest {
    string phone_number = 1;
    string verification_code = 2;
    string password = 3;
    string channel = 4;
}

message LoginResponse {
    int64 user_id = 1;
    string authorization = 2;
}

// 密码登录请求
// POST /v2/account/login
message LoginV2Request {
    string phone_number = 1;
    string password = 2;
}

message LoginV2Response {
    int64 user_id = 1;
    string authorization = 2;
}

// 一键登录请求
// POST /account/v1/login/by-one-click
message LoginByOneClickRequest {
    // 一键登录token
}

message LoginByOneClickResponse {
    int64 user_id = 1;
    string authorization = 2;
}

// 获取用户信息
// GET /account/v1/my_profile
message MyProfileResponse {
    int64 user_id = 1;
    string nickname = 2;
    string avatar = 3;
    string steamid = 4;
    int64 register_time = 5;
    repeated Member members = 6;
    Member member = 7;
    UserVideoAward video_award = 8;
    int64 mobile_not_get_ad_duration = 9;
}

// 会员信息
message Member {
    int64 type = 1;
    int64 expire_time = 2;
}

// 视频奖励信息
message UserVideoAward {
    int64 award = 1;
    bool has = 2;
}

// 刷新token
// POST /v2/account/refresh/token
message RefreshTokenRequest {
    // 空请求体或包含refresh_token
}

message RefreshTokenResponse {
    string authorization = 1;
}
